name: Deploy to GitHub Pages

# FIRST-TIME SETUP (required once, in GitHub UI):
# Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Without this, "Setup Pages" fails with: Get Pages site failed (404)
#
# Firebase Web config for the admin SPA build (Repository → Settings → Variables):
#   FIREBASE_WEB_API_KEY      — apiKey from Firebase Console → Web app (starts with AIza)
#   FIREBASE_WEB_AUTH_DOMAIN  — e.g. ytme-news2trip.firebaseapp.com
#   FIREBASE_PROJECT_ID       — e.g. ytme-news2trip
#   FIREBASE_WEB_APP_ID       — appId from Web app config
# Aliases VITE_FIREBASE_* are also accepted if you named variables that way.

on:
  push:
    branches: [main]
    paths:
      - 'packages/admin/**'
      - 'landings/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
  workflow_run:
    # Both pipelines push landings; deploy-pages picks the updated files.
    workflows: ['Generate landing', 'Run scheduled generations']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Resolve Firebase web config
        id: fb
        env:
          FB_API_KEY: ${{ vars.FIREBASE_WEB_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ vars.FIREBASE_WEB_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          FB_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID || vars.VITE_FIREBASE_APP_ID }}
        run: |
          set -e
          missing=""
          for name in FB_API_KEY FB_AUTH_DOMAIN FB_PROJECT_ID FB_APP_ID; do
            eval "val=\${$name}"
            if [ -z "$val" ]; then
              missing="$missing ${name#FB_}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Variables:$missing"
            echo "Set FIREBASE_WEB_API_KEY, FIREBASE_WEB_AUTH_DOMAIN, FIREBASE_PROJECT_ID, FIREBASE_WEB_APP_ID"
            echo "(or the same names with VITE_FIREBASE_ prefix) in Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          case "$FB_API_KEY" in
            AIza*) ;;
            *)
              echo "::error::FIREBASE_WEB_API_KEY must start with AIza (Firebase Web API key, not service account JSON)"
              exit 1
              ;;
          esac
          echo "api_key_prefix=${FB_API_KEY:0:8}…" >> "$GITHUB_OUTPUT"
          echo "project_id=$FB_PROJECT_ID" >> "$GITHUB_OUTPUT"
          {
            echo "VITE_REPO_OWNER=${{ github.repository_owner }}"
            echo "VITE_REPO_NAME=${{ github.event.repository.name }}"
            echo "VITE_GENERATE_WORKFLOW_FILE=generate.yml"
            echo "VITE_LANDING_BASE_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
            echo "VITE_FIREBASE_API_KEY=$FB_API_KEY"
            echo "VITE_FIREBASE_AUTH_DOMAIN=$FB_AUTH_DOMAIN"
            echo "VITE_FIREBASE_PROJECT_ID=$FB_PROJECT_ID"
            echo "VITE_FIREBASE_APP_ID=$FB_APP_ID"
          } | tee .env.production > packages/admin/.env.production
          echo "Firebase config ready (api key prefix: ${FB_API_KEY:0:8}…, project: $FB_PROJECT_ID)"

      - name: Build admin SPA
        env:
          VITE_REPO_OWNER: ${{ github.repository_owner }}
          VITE_REPO_NAME: ${{ github.event.repository.name }}
          VITE_GENERATE_WORKFLOW_FILE: generate.yml
          VITE_LANDING_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          VITE_FIREBASE_API_KEY: ${{ vars.FIREBASE_WEB_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_WEB_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID || vars.VITE_FIREBASE_APP_ID }}
        run: yarn workspace @ytme/admin build

      - name: Verify Firebase config in bundle
        env:
          EXPECT_PROJECT_ID: ${{ steps.fb.outputs.project_id }}
        run: |
          set -e
          bundle=$(ls packages/admin/dist/assets/index-*.js | head -1)
          if [ -z "$bundle" ]; then
            echo "::error::Admin bundle not found"
            exit 1
          fi
          if ! grep -qF "$EXPECT_PROJECT_ID" "$bundle"; then
            echo "::error::Project id '$EXPECT_PROJECT_ID' not found in $bundle — Vite did not bake Firebase env"
            exit 1
          fi
          if grep -qE 'apiKey:""' "$bundle" || grep -qE "apiKey:''" "$bundle"; then
            echo "::error::Empty Firebase apiKey in built bundle"
            exit 1
          fi
          echo "OK: Firebase project id present in $(basename "$bundle")"

      - name: Assemble Pages artifact
        run: |
          set -e
          rm -rf dist
          mkdir -p dist
          cp -r packages/admin/dist/. dist/
          if [ -d landings ]; then
            mkdir -p dist/landings
            cp -r landings/. dist/landings/
          fi
          # SPA fallback for client-side router (404.html points back to the SPA)
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # May auto-enable Pages for repo admins; first time still requires
          # Settings → Pages → Source = "GitHub Actions" in the UI.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
