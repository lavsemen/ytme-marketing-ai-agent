name: Run scheduled generations

on:
  schedule:
    # Every 15 min — each Firestore rule has its own cron+tz; the agent picks
    # rules whose previous tick is within a 90-minute grace window (GH Actions
    # often starts late at the top of the hour).
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run every enabled rule, ignoring the time window (manual test)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

# Avoid two scheduled workflows clashing on push to the same branch.
concurrency:
  group: scheduled-generations
  cancel-in-progress: false

jobs:
  scheduled:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Check required secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY is missing or empty. Add it: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is missing. Firebase Console → Service accounts → Generate new private key"
            exit 1
          fi

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          CREDS="${RUNNER_TEMP}/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDS"
          node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$CREDS"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS" >> "$GITHUB_ENV"
          echo "Firebase service account JSON validated"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
          TOUR_CLIENT_MODE: ${{ vars.TOUR_CLIENT_MODE || 'real' }}
          YOUTRAVEL_API_BASE_URL: ${{ vars.YOUTRAVEL_API_BASE_URL || 'https://youtravel.me' }}
          YOUTRAVEL_IMAGE_BASE_URL: ${{ vars.YOUTRAVEL_IMAGE_BASE_URL || 'https://youtravel.me/' }}
          LANDING_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          LOG_LEVEL: info
          FORCE_RUN: ${{ inputs.force }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ vars.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_AUTH_DOMAIN: ${{ vars.FIREBASE_WEB_AUTH_DOMAIN }}
          FIREBASE_WEB_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
        run: |
          set -e
          ARGS=(--run-id "${{ github.run_id }}")
          if [ "${FORCE_RUN}" = "true" ]; then
            ARGS+=(--force)
          fi
          yarn workspace @ytme/agent run-scheduled "${ARGS[@]}"
          echo "Scheduled run finished (same pipeline as generate.yml — post + Slack on success)."

      - name: Commit & push landings
        run: |
          set -e
          git config user.name  "youtravel-marketing-bot"
          git config user.email "youtravel-marketing-bot@users.noreply.github.com"
          git add landings
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "ci: scheduled generation (run ${{ github.run_id }})"
          git push origin HEAD:${{ github.ref_name }}
