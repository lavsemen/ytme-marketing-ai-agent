name: Generate landing

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source id from sources.json (or "all" for all enabled)'
        required: false
        default: 'all'
      hint:
        description: 'Optional hint for this run (passed to all LLM calls). Example: focus on family travel, premium audience.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Check required secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY is missing or empty. Add it: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
          TOUR_CLIENT_MODE: ${{ vars.TOUR_CLIENT_MODE || 'real' }}
          YOUTRAVEL_API_BASE_URL: ${{ vars.YOUTRAVEL_API_BASE_URL || 'https://youtravel.me' }}
          YOUTRAVEL_IMAGE_BASE_URL: ${{ vars.YOUTRAVEL_IMAGE_BASE_URL || 'https://youtravel.me/' }}
          LANDING_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          LOG_LEVEL: info
          RUN_HINT: ${{ inputs.hint }}
        run: |
          set -e
          ARGS=(--source "${{ inputs.source }}" --run-id "${{ github.run_id }}")
          if [ -n "${RUN_HINT}" ]; then
            ARGS+=(--hint "${RUN_HINT}")
          fi
          yarn workspace @ytme/agent generate "${ARGS[@]}"

      - name: Commit & push results
        run: |
          set -e
          git config user.name  "youtravel-marketing-bot"
          git config user.email "youtravel-marketing-bot@users.noreply.github.com"
          git add landings out/results
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "ci: generate landing (run ${{ github.run_id }})"
          git push origin HEAD:${{ github.ref_name }}
